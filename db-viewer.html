<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据库查看器</title>
    <link rel="stylesheet" href="css/variables.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--color-bg, #f0f2f5);
            color: var(--color-text, #1e293b);
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .search-input {
            padding: 8px 12px;
            border: 1px solid var(--color-border, #e2e8f0);
            border-radius: 6px;
            background: var(--color-surface, #fff);
            color: var(--color-text, #1e293b);
            font-size: 14px;
            width: 250px;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--color-primary, #2563eb);
        }
        .btn {
            padding: 8px 16px;
            border: 1px solid var(--color-border, #e2e8f0);
            border-radius: 6px;
            background: var(--color-surface, #fff);
            color: var(--color-text, #1e293b);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn:hover { background: var(--color-primary-bg, #eff6ff); }
        .btn.active {
            background: var(--color-primary, #2563eb);
            color: white;
            border-color: var(--color-primary, #2563eb);
        }
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--color-border, #e2e8f0);
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-secondary, #64748b);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.15s;
        }
        .tab:hover { color: var(--color-text, #1e293b); }
        .tab.active {
            color: var(--color-primary, #2563eb);
            border-bottom-color: var(--color-primary, #2563eb);
        }
        .main { display: flex; gap: 20px; min-height: calc(100vh - 140px); }
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--color-surface, #fff);
            border: 1px solid var(--color-border, #e2e8f0);
            border-radius: 8px;
            overflow: hidden;
        }
        .sidebar-title {
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-secondary, #64748b);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--color-border, #e2e8f0);
        }
        .store-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            transition: background 0.1s;
            border-bottom: 1px solid var(--color-border, #f1f5f9);
        }
        .store-item:hover { background: var(--color-primary-bg, #eff6ff); }
        .store-item.active { background: var(--color-primary-bg, #eff6ff); color: var(--color-primary, #2563eb); font-weight: 600; }
        .store-count {
            background: var(--color-primary-bg, #eff6ff);
            color: var(--color-primary, #2563eb);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }
        .content {
            flex: 1;
            background: var(--color-surface, #fff);
            border: 1px solid var(--color-border, #e2e8f0);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .content-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--color-border, #e2e8f0);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
        }
        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .json-tree { font-family: 'Consolas', 'Monaco', monospace; font-size: 13px; line-height: 1.6; }
        .json-key { color: #7c3aed; }
        .json-string { color: #059669; }
        .json-number { color: #2563eb; }
        .json-boolean { color: #d97706; }
        .json-null { color: #94a3b8; }
        .json-bracket { color: #64748b; font-weight: bold; }
        .json-toggle {
            cursor: pointer;
            user-select: none;
            display: inline-block;
            width: 16px;
            text-align: center;
            color: var(--color-text-secondary, #64748b);
            font-size: 11px;
        }
        .json-toggle:hover { color: var(--color-primary, #2563eb); }
        .json-collapsed { display: none; }
        .json-preview { color: var(--color-text-muted, #94a3b8); font-style: italic; }
        .json-record {
            border: 1px solid var(--color-border, #e2e8f0);
            border-radius: 6px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .json-record-header {
            padding: 8px 12px;
            background: var(--color-bg, #f8fafc);
            border-bottom: 1px solid var(--color-border, #e2e8f0);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 13px;
        }
        .json-record-header:hover { background: var(--color-primary-bg, #eff6ff); }
        .json-record-body { padding: 12px; display: none; }
        .json-record-body.open { display: block; }
        .copy-btn {
            padding: 4px 10px;
            font-size: 11px;
            border: 1px solid var(--color-border, #e2e8f0);
            border-radius: 4px;
            background: var(--color-surface, #fff);
            cursor: pointer;
            color: var(--color-text-secondary, #64748b);
        }
        .copy-btn:hover { background: var(--color-primary-bg, #eff6ff); color: var(--color-primary, #2563eb); }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-muted, #94a3b8);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 12px;
            border-top: 1px solid var(--color-border, #e2e8f0);
        }
        .pagination .btn { padding: 6px 12px; font-size: 12px; }
        .page-info { font-size: 13px; color: var(--color-text-secondary, #64748b); }
        .ls-key { color: #7c3aed; font-weight: 600; }
        .ls-value { font-family: 'Consolas', monospace; font-size: 13px; }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--color-primary, #2563eb);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            z-index: 9999;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗄️ 数据库查看器</h1>
        <div class="toolbar">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索关键词...">
            <button class="btn active" id="formatBtn" onclick="toggleFormat()">格式化</button>
            <button class="btn" id="rawBtn" onclick="toggleFormat()">原始数据</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="indexeddb" onclick="switchTab('indexeddb')">IndexedDB</div>
        <div class="tab" data-tab="localstorage" onclick="switchTab('localstorage')">localStorage</div>
    </div>

    <div class="main" id="indexeddb-view">
        <div class="sidebar" id="storeList">
            <div class="sidebar-title">对象仓库</div>
            <div id="storeListItems">加载中...</div>
        </div>
        <div class="content">
            <div class="content-header">
                <span id="currentStoreName">选择一个对象仓库</span>
                <span id="recordCount"></span>
            </div>
            <div class="content-body" id="dataView">
                <div class="empty-state">
                    <div class="icon">📂</div>
                    <p>请从左侧选择一个对象仓库查看数据</p>
                </div>
            </div>
            <div class="pagination" id="pagination" style="display:none">
                <button class="btn" id="prevBtn" onclick="changePage(-1)">上一页</button>
                <span class="page-info" id="pageInfo">1 / 1</span>
                <button class="btn" id="nextBtn" onclick="changePage(1)">下一页</button>
            </div>
        </div>
    </div>

    <div class="main" id="localstorage-view" style="display:none">
        <div class="content" style="width:100%">
            <div class="content-header">
                <span>localStorage 键值对</span>
                <span id="lsCount"></span>
            </div>
            <div class="content-body" id="lsView"></div>
        </div>
    </div>

    <script src="js/store.js"></script>
    <script>
        let currentTab = 'indexeddb';
        let currentStore = null;
        let allRecords = [];
        let filteredRecords = [];
        let currentPage = 1;
        const pageSize = 50;
        let isFormatted = true;
        let searchKeyword = '';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            document.getElementById('indexeddb-view').style.display = tab === 'indexeddb' ? 'flex' : 'none';
            document.getElementById('localstorage-view').style.display = tab === 'localstorage' ? 'flex' : 'none';
            if (tab === 'localstorage') renderLocalStorage();
        }

        function toggleFormat() {
            isFormatted = !isFormatted;
            document.getElementById('formatBtn').classList.toggle('active', isFormatted);
            document.getElementById('rawBtn').classList.toggle('active', !isFormatted);
            if (currentTab === 'indexeddb' && currentStore) renderRecords();
            if (currentTab === 'localstorage') renderLocalStorage();
        }

        async function loadStores() {
            const container = document.getElementById('storeListItems');
            try {
                const db = await Store.openDB();
                const storeNames = Array.from(db.objectStoreNames);
                let html = '';
                for (const name of storeNames) {
                    const tx = db.transaction(name, 'readonly');
                    const store = tx.objectStore(name);
                    const count = await new Promise(r => {
                        const req = store.count();
                        req.onsuccess = () => r(req.result);
                    });
                    html += `<div class="store-item" data-store="${name}" onclick="loadStore('${name}')">
                        <span>${name}</span>
                        <span class="store-count">${count}</span>
                    </div>`;
                }
                container.innerHTML = html || '<p style="padding:16px;color:var(--color-text-muted)">无对象仓库</p>';
            } catch (e) {
                container.innerHTML = `<p style="padding:16px;color:#dc2626">错误: ${e.message}</p>`;
            }
        }

        async function loadStore(name) {
            currentStore = name;
            currentPage = 1;
            document.querySelectorAll('.store-item').forEach(i => i.classList.toggle('active', i.dataset.store === name));
            document.getElementById('currentStoreName').textContent = name;

            try {
                const db = await Store.openDB();
                const tx = db.transaction(name, 'readonly');
                const store = tx.objectStore(name);
                const records = await new Promise(r => {
                    const req = store.getAll();
                    req.onsuccess = () => r(req.result);
                });
                allRecords = records;
                applyFilter();
            } catch (e) {
                document.getElementById('dataView').innerHTML = `<p style="color:#dc2626">错误: ${e.message}</p>`;
            }
        }

        function applyFilter() {
            if (!searchKeyword) {
                filteredRecords = allRecords;
            } else {
                const kw = searchKeyword.toLowerCase();
                filteredRecords = allRecords.filter(r => JSON.stringify(r).toLowerCase().includes(kw));
            }
            document.getElementById('recordCount').textContent = `共 ${filteredRecords.length} 条记录`;
            renderRecords();
        }

        function renderRecords() {
            const view = document.getElementById('dataView');
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredRecords.length / pageSize) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * pageSize;
            const pageRecords = filteredRecords.slice(start, start + pageSize);

            if (filteredRecords.length === 0) {
                view.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无数据</p></div>';
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = filteredRecords.length > pageSize ? 'flex' : 'none';
            document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;

            if (isFormatted) {
                view.innerHTML = pageRecords.map((r, i) => {
                    const idx = start + i;
                    const preview = getPreview(r);
                    return `<div class="json-record">
                        <div class="json-record-header" onclick="toggleRecord(this)">
                            <span>记录 #${idx + 1} ${preview}</span>
                            <span>
                                <button class="copy-btn" onclick="event.stopPropagation();copyJSON(${idx})">复制</button>
                                <span class="json-toggle">▼</span>
                            </span>
                        </div>
                        <div class="json-record-body">${renderJSON(r)}</div>
                    </div>`;
                }).join('');
            } else {
                view.innerHTML = pageRecords.map((r, i) => {
                    const idx = start + i;
                    return `<div class="json-record">
                        <div class="json-record-header" onclick="toggleRecord(this)">
                            <span>记录 #${idx + 1}</span>
                            <span>
                                <button class="copy-btn" onclick="event.stopPropagation();copyJSON(${idx})">复制</button>
                                <span class="json-toggle">▼</span>
                            </span>
                        </div>
                        <div class="json-record-body"><pre style="white-space:pre-wrap;word-break:break-all;font-size:12px">${escapeHTML(JSON.stringify(r))}</pre></div>
                    </div>`;
                }).join('');
            }
        }

        function getPreview(obj) {
            if (obj.title) return `- ${obj.title}`;
            if (obj.name) return `- ${obj.name}`;
            if (obj.query) return `- ${obj.query}`;
            return '';
        }

        function renderJSON(obj, indent) {
            indent = indent || 0;
            if (obj === null) return '<span class="json-null">null</span>';
            if (typeof obj === 'string') return `<span class="json-string">"${escapeHTML(obj)}"</span>`;
            if (typeof obj === 'number') return `<span class="json-number">${obj}</span>`;
            if (typeof obj === 'boolean') return `<span class="json-boolean">${obj}</span>`;
            const pad = '  '.repeat(indent + 1);
            const padClose = '  '.repeat(indent);
            if (Array.isArray(obj)) {
                if (obj.length === 0) return '<span class="json-bracket">[]</span>';
                const id = 'arr_' + Math.random().toString(36).slice(2, 8);
                const preview = `${obj.length} items`;
                const items = obj.map((v, i) => `${pad}<span class="json-number">${i}</span>: ${renderJSON(v, indent + 1)}`).join(',\n');
                return `<span class="json-toggle" onclick="toggleNode('${id}')">▼</span><span class="json-bracket">[</span><span class="json-preview" id="${id}_p" style="display:none"> ${preview} </span><span id="${id}">\n${items}\n${padClose}</span><span class="json-bracket">]</span>`;
            }
            if (typeof obj === 'object') {
                const keys = Object.keys(obj);
                if (keys.length === 0) return '<span class="json-bracket">{}</span>';
                const id = 'obj_' + Math.random().toString(36).slice(2, 8);
                const preview = `${keys.length} keys`;
                const items = keys.map(k => `${pad}<span class="json-key">"${escapeHTML(k)}"</span>: ${renderJSON(obj[k], indent + 1)}`).join(',\n');
                return `<span class="json-toggle" onclick="toggleNode('${id}')">▼</span><span class="json-bracket">{</span><span class="json-preview" id="${id}_p" style="display:none"> ${preview} </span><span id="${id}">\n${items}\n${padClose}</span><span class="json-bracket">}</span>`;
            }
            return String(obj);
        }

        function toggleNode(id) {
            const node = document.getElementById(id);
            const preview = document.getElementById(id + '_p');
            const toggle = node.previousElementSibling.previousElementSibling;
            if (node.style.display === 'none') {
                node.style.display = '';
                preview.style.display = 'none';
                toggle.textContent = '▼';
            } else {
                node.style.display = 'none';
                preview.style.display = 'inline';
                toggle.textContent = '▶';
            }
        }

        function toggleRecord(header) {
            const body = header.nextElementSibling;
            const toggle = header.querySelector('.json-toggle');
            body.classList.toggle('open');
            toggle.textContent = body.classList.contains('open') ? '▲' : '▼';
        }

        function changePage(delta) {
            currentPage += delta;
            renderRecords();
        }

        function copyJSON(idx) {
            const text = JSON.stringify(filteredRecords[idx], null, 2);
            navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板'));
        }

        function renderLocalStorage() {
            const view = document.getElementById('lsView');
            const items = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                items.push({ key, value: localStorage.getItem(key) });
            }
            document.getElementById('lsCount').textContent = `共 ${items.length} 个键`;

            const kw = searchKeyword.toLowerCase();
            const filtered = kw ? items.filter(i => i.key.toLowerCase().includes(kw) || i.value.toLowerCase().includes(kw)) : items;

            if (filtered.length === 0) {
                view.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无数据</p></div>';
                return;
            }

            view.innerHTML = filtered.map(item => {
                let displayValue;
                try {
                    const parsed = JSON.parse(item.value);
                    displayValue = isFormatted ? renderJSON(parsed) : `<pre style="white-space:pre-wrap;word-break:break-all;font-size:12px">${escapeHTML(JSON.stringify(parsed))}</pre>`;
                } catch {
                    displayValue = isFormatted ? `<span class="json-string">"${escapeHTML(item.value)}"</span>` : escapeHTML(item.value);
                }
                return `<div class="json-record">
                    <div class="json-record-header" onclick="toggleRecord(this)">
                        <span class="ls-key">${escapeHTML(item.key)}</span>
                        <span class="json-toggle">▼</span>
                    </div>
                    <div class="json-record-body"><div class="ls-value">${displayValue}</div></div>
                </div>`;
            }).join('');
        }

        function escapeHTML(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast-msg';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
        }

        document.getElementById('searchInput').addEventListener('input', function() {
            searchKeyword = this.value.trim();
            if (currentTab === 'indexeddb' && currentStore) { currentPage = 1; applyFilter(); }
            if (currentTab === 'localstorage') renderLocalStorage();
        });

        loadStores();
    </script>
</body>
</html>
